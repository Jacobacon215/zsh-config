# zoxide
eval "$(zoxide init --cmd cd zsh)"

# pyenv
command -v pyenv > /dev/null || export PATH="$PYENV_ROOT/bin:$PATH"
pyenv() { # lazy load per https://santacloud.dev/posts/optimizing-zsh-startup-performance/
    unset -f pyenv
    eval "$(command pyenv init -)"
    eval "$(command pyenv virtualenv-init -)"
    pyenv "$@"
}
pyenv-hang() {
    rm $PYENV_ROOT/shims/.pyenv-shim
}
